name: Claude Code Review

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Review the changes in this push/PR for bugs, security issues, and logic errors.
            Be concise - only flag real problems, not style nits.
            Focus on: correctness, security, and potential runtime errors.
